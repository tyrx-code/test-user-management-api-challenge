name: TGR_QA_Run_Scripts

on:
  workflow_dispatch:
    inputs:
      tag:
        type: choice
        options:
          - health-check
          - smoke
          - full-regression
          - e2e
          - prod-smoke
        description: Select Tag To Run
      env:
        type: choice
        options:
          - dev
          - prod
        description: Select Environment

jobs:
  automated-test-suite:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      checks: write

    steps:
      - name: Checkout_Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Set_Up_JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set_Up_Docker_Image_Container
        run: |
          docker run -d -p 3000:3000 ghcr.io/danielsilva-loanpro/sdet-interview-challenge:latest

      - name: Wait_For_Readines
        run: |
          echo "Waiting for API..."
          for i in {1..20}; do
            if curl -s http://localhost:3000/${{ github.event.inputs.env }}/users; then
              echo "API is ready!"
              break
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done

      - name: Check_Container
        run: |
          docker ps -a
          curl -v http://localhost:3000/${{ github.event.inputs.env }}/users

      - name: Execute_API_Tests
        run: mvn clean test -Dcucumber.filter.tags="@${{ github.event.inputs.tag }}"
        working-directory: sdet
        env:
          BASE_URL: http://localhost:3000/${{ github.event.inputs.env }}

      - name: Upload_Test_Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Download-HTML-Report
          path: sdet/target/extent-report/index.html

      - name: Test_Summary_Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Test Results - ${{ github.event.inputs.env }} - ${{ github.event.inputs.tag }}
          path: sdet/target/surefire-reports/TEST-*.xml
          reporter: java-junit
          fail-on-error: false
          use-actions-summary: true

      - name: Job_Summary
        if: always()
        working-directory: sdet
        run: |
          echo "#### Test Summary Report" >> $GITHUB_STEP_SUMMARY
          echo "Run Metrics Overview. How many test pass or fail. For more details please go to Dorny/Cucumber Test Result." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Run Configuration" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ github.event.inputs.env }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | ${{ github.event.inputs.tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f target/surefire-reports/TEST-*.xml ]; then
            TESTS=$(grep -o 'tests="[0-9]*"' target/surefire-reports/TEST-*.xml | grep -o '[0-9]*' | head -1)
            FAILURES=$(grep -o 'failures="[0-9]*"' target/surefire-reports/TEST-*.xml | grep -o '[0-9]*' | head -1)
            PASSED=$((TESTS - FAILURES))
            echo "| Total Tests | $TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| Failures | $FAILURES |" >> $GITHUB_STEP_SUMMARY
          fi