name: TGR_QA_Parallel_Environment_Run

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: write

jobs:

  dev-regression:
    name: DEV - Full Regression
    runs-on: ubuntu-latest

    steps:
      - name: Checkout_Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Set_Up_JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set_Up_Docker_Container
        run: |
          docker run -d -p 3000:3000 ghcr.io/danielsilva-loanpro/sdet-interview-challenge:latest

      - name: Wait_For_Readiness
        run: |
          echo "Waiting for API..."
          sleep 10

      - name: Execute_DEV_Regression
        working-directory: sdet
        run: mvn clean test -Dcucumber.filter.tags="@full-regression"
        env:
          BASE_URL: http://localhost:3000/dev

      - name: Test_Report_DEV
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: DEV - Regression Results
          path: sdet/target/surefire-reports/TEST-*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Job_Summary_DEV
        if: always()
        working-directory: sdet
        run: |
          echo "## 🪲 DEV TSR 🪲" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Metrics Overview — for full details check the **Cucumber Tests** report in the left panel." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Run Configuration" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Development |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | full-regression |" >> $GITHUB_STEP_SUMMARY
          echo "| Run | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          if [ -f target/surefire-reports/TEST-*.xml ]; then
            TESTS=$(grep -o 'tests="[0-9]*"' target/surefire-reports/TEST-*.xml | grep -o '[0-9]*' | head -1)
            FAILURES=$(grep -o 'failures="[0-9]*"' target/surefire-reports/TEST-*.xml | grep -o '[0-9]*' | head -1)
            echo "| Total Tests | $TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Failures | $FAILURES |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload_DEV_Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: DEV-Regression-HTML-Report
          path: sdet/target/extent-report/index.html

  prod-smoke:
    name: PROD - Light Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout_Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Set_Up_JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set_Up_Docker_Container
        run: |
          docker run -d -p 3000:3000 ghcr.io/danielsilva-loanpro/sdet-interview-challenge:latest

      - name: Wait_For_Readiness
        run: |
          echo "Waiting for API..."
          sleep 10

      - name: Execute_PROD_Smoke
        working-directory: sdet
        run: mvn clean test -Dcucumber.filter.tags="@prod-smoke"
        env:
          BASE_URL: http://localhost:3000/prod

      - name: Test_Report_PROD
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: PROD - Smoke Results
          path: sdet/target/surefire-reports/TEST-*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Job_Summary_PROD
        if: always()
        working-directory: sdet
        run: |
          echo "## 🪲 PROD TSR 🪲" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Metrics Overview — for full details check the **Cucumber Tests** report in the left panel." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Run Configuration" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Production |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | prod-smoke |" >> $GITHUB_STEP_SUMMARY
          echo "| Run | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          if [ -f target/surefire-reports/TEST-*.xml ]; then
            TESTS=$(grep -o 'tests="[0-9]*"' target/surefire-reports/TEST-*.xml | grep -o '[0-9]*' | head -1)
            FAILURES=$(grep -o 'failures="[0-9]*"' target/surefire-reports/TEST-*.xml | grep -o '[0-9]*' | head -1)
            echo "| Total Tests | $TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Failures | $FAILURES |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload_PROD_Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: PROD-Smoke-HTML-Report
          path: sdet/target/extent-report/index.html