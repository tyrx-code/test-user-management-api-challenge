name: TGR_Playwright_Tests

on:
  workflow_dispatch:
    inputs:
      tag:
        type: choice
        options:
          - smoke
          - e2e
          - negative
          - security
        description: Select Tag To Run
      env:
        type: choice
        options:
          - dev
          - prod
        description: Select Environment

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  playwright-tests:
    name: Playwright - ${{ github.event.inputs.tag }} - ${{ github.event.inputs.env }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout_Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup_Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install_Dependencies
        working-directory: sdet2
        run: npm install

      - name: Install_Playwright_Browsers
        working-directory: sdet2
        run: npx playwright install --with-deps

      - name: Set_Up_Docker_Image_Container
        run: |
          docker run -d -p 3000:3000 ghcr.io/danielsilva-loanpro/sdet-interview-challenge:latest

      - name: Wait_For_Readines
        run: |
          echo "Waiting for API..."
          for i in {1..20}; do
            if curl -s http://localhost:3000/${{ github.event.inputs.env }}/users; then
              echo "API is ready!"
              break
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done

      - name: Check_Container
        run: |
          docker ps -a
          curl -v http://localhost:3000/${{ github.event.inputs.env }}/users

      - name: Execute_Playwright_Tests
        working-directory: sdet2
        run: npx playwright test --grep @${{ github.event.inputs.tag }}
        env:
          BASE_URL: http://localhost:3000/${{ github.event.inputs.env }}

      - name: Upload_Playwright_Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Playwright-HTML-Report
          path: sdet2/playwright-report/

      - name: Upload_Playwright_Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Playwright-HTML-Report-${{ github.event.inputs.env }}-${{ github.event.inputs.tag }}-#${{ github.run_number }}
          path: sdet2/playwright-report/